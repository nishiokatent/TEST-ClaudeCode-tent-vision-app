<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>テント張替シミュレーター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --text: #f0f0f0;
    --text2: #888;
    --danger: #ff4747;
    --success: #47ff8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body, #canvas-wrap, #bottom-panel {
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100dvh;
    width: 100dvw;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 8px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  /* Hanko stamp mark */
  .hanko {
    width: 38px;
    height: 38px;
    flex-shrink: 0;
  }
  .header-right { display: flex; align-items: center; gap: 8px; }

  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #0a0a0a;
    touch-action: none;
  }

  #view-canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  #empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    pointer-events: none;
  }
  .empty-icon {
    width: 64px; height: 64px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
  }
  .empty-text { color: var(--text2); font-size: 0.85rem; text-align: center; line-height: 1.8; }

  #status-bar {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    background: rgba(15,15,15,0.92);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.75rem;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 20;
  }
  #status-bar.show    { opacity: 1; }
  #status-bar.success { border-color: var(--success); color: var(--success); }
  #status-bar.error   { border-color: var(--danger);  color: var(--danger); }
  #status-bar.info    { border-color: var(--accent2); color: var(--accent2); }

  #zoom-indicator {
    position: absolute;
    bottom: 12px; right: 12px;
    background: rgba(15,15,15,0.85);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 4px 10px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    pointer-events: none;
  }

  #bottom-panel {
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab-bar { display: flex; border-bottom: 1px solid var(--border); }
  .tab {
    flex: 1; padding: 10px;
    text-align: center; font-size: 0.72rem; font-weight: 600;
    color: var(--text2); cursor: pointer; letter-spacing: 0.04em;
    border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; padding: 12px 16px; }
  .tab-content.active { display: block; }

  .ctrl-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .ctrl-row:last-child { margin-bottom: 0; }
  label.ctrl-label {
    font-size: 0.72rem; color: var(--text2); font-weight: 600;
    letter-spacing: 0.06em; white-space: nowrap; min-width: 48px;
  }
  select, input[type="password"] {
    flex: 1;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 10px; border-radius: 8px;
    font-size: 0.8rem; font-family: inherit; outline: none;
    transition: border 0.2s; min-width: 0;
  }
  select:focus, input[type="password"]:focus { border-color: var(--accent2); }

  .btn {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 9px 14px; border-radius: 8px;
    font-size: 0.78rem; font-weight: 700; font-family: inherit;
    cursor: pointer; border: none; transition: all 0.15s;
    letter-spacing: 0.03em; white-space: nowrap;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn-primary { background: var(--accent); color: #0f0f0f; }
  .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger  { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-success { background: var(--success); color: #0f0f0f; }
  .btn-icon    { width: 36px; height: 36px; padding: 0; border-radius: 8px; font-size: 1rem; }
  .btn-row     { display: flex; gap: 8px; }
  .btn-row .btn{ flex: 1; }

  .mode-toggle {
    display: flex; background: var(--surface2); border-radius: 8px;
    padding: 3px; gap: 2px; border: 1px solid var(--border);
  }
  .mode-btn {
    flex: 1; padding: 6px 10px; border-radius: 6px;
    font-size: 0.72rem; font-weight: 700; font-family: inherit;
    cursor: pointer; border: none; background: transparent;
    color: var(--text2); transition: all 0.15s; letter-spacing: 0.04em;
  }
  .mode-btn.active { background: var(--accent); color: #0f0f0f; }

  .hint {
    font-size: 0.68rem; color: var(--text2); line-height: 1.7;
    padding: 8px 10px; background: var(--surface2); border-radius: 8px;
    border-left: 2px solid var(--accent2); margin-bottom: 8px;
  }
  .point-badge {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); border-radius: 6px; padding: 4px 8px;
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
  }
  .point-badge span { color: var(--accent); font-weight: 700; }
  .color-swatch {
    width: 20px; height: 20px; border-radius: 4px;
    border: 1px solid var(--border); flex-shrink: 0;
  }
  #upload-btn { position: relative; overflow: hidden; }
  #upload-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 100px; }
  input[type="range"] { flex: 1; accent-color: var(--accent); cursor: pointer; }
  .range-val {
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    color: var(--accent); min-width: 30px; text-align: right;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
  <!-- 落款風ハンコマーク -->
  <svg class="hanko" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <!-- 外枠二重円 -->
    <circle cx="40" cy="40" r="37" fill="none" stroke="#c0392b" stroke-width="2.5"/>
    <circle cx="40" cy="40" r="33" fill="none" stroke="#c0392b" stroke-width="1"/>
    <!-- 背景うっすら赤 -->
    <circle cx="40" cy="40" r="33" fill="rgba(192,57,43,0.08)"/>
    <!-- 上段：西岡 -->
    <text x="40" y="30" text-anchor="middle" dominant-baseline="middle"
      font-family="'Noto Serif JP','Noto Sans JP',serif" font-size="17" font-weight="700"
      fill="#c0392b" letter-spacing="3">西岡</text>
    <!-- 区切り線 -->
    <line x1="18" y1="40" x2="62" y2="40" stroke="#c0392b" stroke-width="0.8" opacity="0.6"/>
    <!-- 下段：テント -->
    <text x="40" y="54" text-anchor="middle" dominant-baseline="middle"
      font-family="'Noto Serif JP','Noto Sans JP',serif" font-size="13" font-weight="700"
      fill="#c0392b" letter-spacing="2">テント</text>
  </svg>
  <span class="logo-text">TENT SIM</span>
</div>
  <div class="header-right">
    <div class="point-badge">頂点 <span id="point-count">0</span></div>
    <button class="btn btn-ghost btn-icon" id="upload-btn">
      📂<input type="file" id="upload-input" accept="image/*">
    </button>
  </div>
</header>

<div id="canvas-wrap">
  <canvas id="view-canvas"></canvas>
  <div id="empty-state">
    <svg viewBox="0 0 120 120" width="100" height="100" xmlns="http://www.w3.org/2000/svg" style="opacity:0.55">
      <circle cx="60" cy="60" r="56" fill="none" stroke="#c0392b" stroke-width="3.5"/>
      <circle cx="60" cy="60" r="50" fill="none" stroke="#c0392b" stroke-width="1.2"/>
      <circle cx="60" cy="60" r="50" fill="rgba(192,57,43,0.07)"/>
      <text x="60" y="44" text-anchor="middle" dominant-baseline="middle"
        font-family="'Noto Serif JP','Noto Sans JP',serif" font-size="26" font-weight="700"
        fill="#c0392b" letter-spacing="4">西岡</text>
      <line x1="22" y1="60" x2="98" y2="60" stroke="#c0392b" stroke-width="1" opacity="0.5"/>
      <text x="60" y="80" text-anchor="middle" dominant-baseline="middle"
        font-family="'Noto Serif JP','Noto Sans JP',serif" font-size="20" font-weight="700"
        fill="#c0392b" letter-spacing="3">テント</text>
    </svg>
    <div class="empty-text">右上の 📂 から<br>店舗写真を開いてください</div>
  </div>
  <div id="status-bar"></div>
  <div id="zoom-indicator">100%</div>
</div>

<div id="bottom-panel">
  <div class="tab-bar">
    <div class="tab active" data-tab="draw">✏️ 選択</div>
    <div class="tab" data-tab="fabric">🎨 生地</div>
    <div class="tab" data-tab="export">💾 出力</div>
  </div>

  <div class="tab-content active" id="tab-draw">
    <div class="hint">
      📌 タップで頂点追加　　✋ 頂点をドラッグで移動<br>
      🔍 2本指ピンチでズーム／移動　　🗑 頂点を長押しで削除
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost"  onclick="undoPoint()">↩ 戻す</button>
      <button class="btn btn-danger" onclick="clearPoints()">🗑 全消去</button>
    </div>
  </div>

  <div class="tab-content" id="tab-fabric">
    <div class="ctrl-row">
      <label class="ctrl-label">生地</label>
      <div class="color-swatch" id="fabric-swatch"></div>
      <select id="fabric-select" onchange="onFabricChange()">
        <option value="">読み込み中...</option>
      </select>
    </div>
    <div class="ctrl-row">
      <label class="ctrl-label">強度</label>
      <input type="range" id="opacity-slider" min="10" max="100" value="75" oninput="onOpacityChange()">
      <div class="range-val" id="opacity-val">75%</div>
    </div>
    <div class="ctrl-row">
      <label class="ctrl-label">質感</label>
      <input type="range" id="blend-slider" min="0" max="100" value="0" oninput="onBlendChange()">
      <div class="range-val" id="blend-val">自然</div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:0.62rem;color:var(--text2);margin:-4px 0 8px 56px;padding-right:42px;">
      <span>← 陰影残す</span><span>発色重視 →</span>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:4px" id="apply-btn" onclick="applyFabric()" disabled>
      🎨 生地を適用
    </button>
  </div>

  <div class="tab-content" id="tab-export">
    <div class="ctrl-row">
      <label class="ctrl-label">PW</label>
      <input type="password" id="password" placeholder="社内パスワード（任意）">
    </div>
    <div class="btn-row">
      <button class="btn btn-success" id="download-btn" onclick="downloadImage()" disabled>💾 保存</button>
      <button class="btn btn-ghost"   onclick="resetAll()">🔄 リセット</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG
============================================================ */
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQyMy5PUSJjr1f_fnQIpRIUagAp8Dw7Hqckr9422w_459qgQ_j4Bhw4LWygLVWTURa9n4Xl_gBNHAie/pub?output=csv";
const APP_PW  = 'tent';

/* ============================================================
   ELEMENTS
============================================================ */
const wrap  = document.getElementById('canvas-wrap');
const vc    = document.getElementById('view-canvas');
const vctx  = vc.getContext('2d');
const empty = document.getElementById('empty-state');

/* ============================================================
   STATE
============================================================ */
let srcImg        = null;
let points        = [];
let applied       = false;
let scale         = 1;
let offX          = 0;
let offY          = 0;
let fabricDB      = [];
let currentFabric = null;
let opacity       = 0.75;
let blend         = 0;   // 0=multiply, 1=source-over

/* ============================================================
   CANVAS RESIZE — physical pixels = CSS pixels × DPR
============================================================ */
let cssW = 0, cssH = 0;

function resizeCanvas() {
  cssW = wrap.clientWidth;
  cssH = wrap.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  vc.width  = cssW * dpr;
  vc.height = cssH * dpr;
  vc.style.width  = cssW + 'px';
  vc.style.height = cssH + 'px';
  // Reset transform each resize then re-apply DPR scale
  vctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  render();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

/* ============================================================
   TABS
============================================================ */
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-' + t.dataset.tab).classList.add('active');
  });
});

/* ============================================================
   CSV
============================================================ */
fetch(CSV_URL)
  .then(r => r.text())
  .then(text => {
    const rows = text.trim().split('\n').slice(1);
    const sel  = document.getElementById('fabric-select');
    sel.innerHTML = '<option value="">生地を選択...</option>';
    rows.forEach(row => {
      if (!row.trim()) return;
      const c = row.split(',');
      if (!c[4] || !c[5] || !c[6]) return;
      const f = { maker: c[0], name: c[1], code: c[2], color: c[3], r: +c[4], g: +c[5], b: +c[6] };
      fabricDB.push(f);
      const opt = document.createElement('option');
      opt.value = fabricDB.length - 1;
      opt.textContent = `${f.maker} ${f.name} ${f.code} - ${f.color}`;
      sel.appendChild(opt);
    });
    showStatus('生地データ読み込み完了', 'success');
  })
  .catch(() => showStatus('生地データの読み込みに失敗しました', 'error'));

function onFabricChange() {
  const v = document.getElementById('fabric-select').value;
  currentFabric = v === '' ? null : fabricDB[+v];
  document.getElementById('fabric-swatch').style.background = currentFabric
    ? `rgb(${currentFabric.r},${currentFabric.g},${currentFabric.b})`
    : 'var(--surface2)';
  updateApplyBtn();
}

function onOpacityChange() {
  opacity = document.getElementById('opacity-slider').value / 100;
  document.getElementById('opacity-val').textContent = Math.round(opacity * 100) + '%';
  if (applied) render();
}

function onBlendChange() {
  blend = document.getElementById('blend-slider').value / 100;
  const val = document.getElementById('blend-val');
  if (blend < 0.2)       val.textContent = '自然';
  else if (blend < 0.5)  val.textContent = '中間寄り';
  else if (blend < 0.8)  val.textContent = '中間';
  else                   val.textContent = '発色';
  if (applied) render();
}

/* ============================================================
   IMAGE UPLOAD
============================================================ */
document.getElementById('upload-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const image = new Image();
    image.onload = () => {
      srcImg  = image;
      points  = [];
      applied = false;
      empty.style.display = 'none';
      fitToScreen();
      render();
      updatePointCount();
      updateApplyBtn();
      document.getElementById('download-btn').disabled = true;
      showStatus('画像を読み込みました', 'success');
    };
    image.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

function fitToScreen() {
  scale = Math.min(cssW / srcImg.width, cssH / srcImg.height) * 0.95;
  offX  = (cssW - srcImg.width  * scale) / 2;
  offY  = (cssH - srcImg.height * scale) / 2;
  updateZoomLabel();
}

/* ============================================================
   RENDER
============================================================ */
function render() {
  vctx.clearRect(0, 0, cssW, cssH);
  if (!srcImg) return;

  const iw = srcImg.width  * scale;
  const ih = srcImg.height * scale;

  // 1. Image
  vctx.drawImage(srcImg, offX, offY, iw, ih);

  if (points.length === 0) return;

  // Screen coords of a point
  const sx = p => p.x * scale + offX;
  const sy = p => p.y * scale + offY;

  // 2. Fabric fill（ハイブリッド合成）
  if (applied && currentFabric && points.length >= 3) {
    const r = currentFabric.r, g = currentFabric.g, b = currentFabric.b;

    // クリッピングパスを作成
    vctx.save();
    vctx.beginPath();
    vctx.moveTo(sx(points[0]), sy(points[0]));
    for (let i = 1; i < points.length; i++) vctx.lineTo(sx(points[i]), sy(points[i]));
    vctx.closePath();
    vctx.clip();

    if (blend <= 0) {
      // 純粋multiply
      vctx.globalCompositeOperation = 'multiply';
      vctx.globalAlpha = opacity;
      vctx.fillStyle = `rgb(${r},${g},${b})`;
      vctx.fillRect(offX, offY, iw, ih);
    } else if (blend >= 1) {
      // 純粋source-over
      vctx.globalCompositeOperation = 'source-over';
      vctx.globalAlpha = opacity;
      vctx.fillStyle = `rgb(${r},${g},${b})`;
      vctx.fillRect(offX, offY, iw, ih);
    } else {
      // ハイブリッド：multiplyレイヤー + source-overレイヤーをブレンド
      // multiplyを(1-blend)の強さで
      vctx.globalCompositeOperation = 'multiply';
      vctx.globalAlpha = opacity * (1 - blend);
      vctx.fillStyle = `rgb(${r},${g},${b})`;
      vctx.fillRect(offX, offY, iw, ih);
      // source-overをblendの強さで重ねる
      vctx.globalCompositeOperation = 'source-over';
      vctx.globalAlpha = opacity * blend;
      vctx.fillStyle = `rgb(${r},${g},${b})`;
      vctx.fillRect(offX, offY, iw, ih);
    }

    vctx.restore();
  }

  // 3. Polygon edge
  if (points.length >= 2) {
    vctx.save();
    vctx.beginPath();
    vctx.moveTo(sx(points[0]), sy(points[0]));
    for (let i = 1; i < points.length; i++) vctx.lineTo(sx(points[i]), sy(points[i]));
    if (points.length >= 3) vctx.closePath();
    vctx.strokeStyle = 'rgba(232,255,71,0.9)';
    vctx.lineWidth = 2;
    vctx.setLineDash([]);
    vctx.stroke();
    if (points.length >= 3) {
      vctx.beginPath();
      vctx.moveTo(sx(points[points.length-1]), sy(points[points.length-1]));
      vctx.lineTo(sx(points[0]), sy(points[0]));
      vctx.setLineDash([6, 4]);
      vctx.strokeStyle = 'rgba(232,255,71,0.35)';
      vctx.stroke();
    }
    vctx.restore();
  }

  // 4. Vertices
  points.forEach((p, i) => {
    vctx.save();
    // Shadow
    vctx.beginPath();
    vctx.arc(sx(p), sy(p), 13, 0, Math.PI * 2);
    vctx.fillStyle = 'rgba(0,0,0,0.4)';
    vctx.fill();
    // Dot
    vctx.beginPath();
    vctx.arc(sx(p), sy(p), 10, 0, Math.PI * 2);
    vctx.fillStyle = i === 0 ? '#e8ff47' : '#ffffff';
    vctx.fill();
    vctx.strokeStyle = '#111';
    vctx.lineWidth = 1.5;
    vctx.stroke();
    // Label
    vctx.font = 'bold 10px monospace';
    vctx.fillStyle = '#111';
    vctx.textAlign = 'center';
    vctx.textBaseline = 'middle';
    vctx.fillText(i + 1, sx(p), sy(p));
    vctx.restore();
  });
}

/* ============================================================
   COORD HELPERS
============================================================ */
// Get position relative to wrap element
function getWrapPos(e) {
  const r = wrap.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function screenToImg(x, y) {
  return { x: (x - offX) / scale, y: (y - offY) / scale };
}

function hitTestScreen(x, y) {
  const HIT = 24;
  for (let i = points.length - 1; i >= 0; i--) {
    const dx = points[i].x * scale + offX - x;
    const dy = points[i].y * scale + offY - y;
    if (Math.hypot(dx, dy) < HIT) return i;
  }
  return -1;
}

/* ============================================================
   POINTER INPUT
============================================================ */
const activePointers = new Map();
let dragIdx         = -1;
let didDrag         = false;
let panStart        = null;
let pinchState      = null;
let longTimer       = null;
let pinchJustEnded  = false; // ピンチ直後の誤タップ防止フラグ

wrap.addEventListener('pointerdown',   onPD, { passive: false });
wrap.addEventListener('pointermove',   onPM, { passive: false });
wrap.addEventListener('pointerup',     onPU, { passive: false });
wrap.addEventListener('pointercancel', onPU, { passive: false });

function onPD(e) {
  e.preventDefault();
  const pos = getWrapPos(e);
  activePointers.set(e.pointerId, pos);

  // 2本指 → ピンチ開始
  if (activePointers.size === 2) {
    cancelLong();
    dragIdx        = -1;
    panStart       = null;
    pinchJustEnded = false;
    const pts = [...activePointers.values()];
    pinchState = {
      dist:  Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y),
      scale0: scale,
      offX0: offX, offY0: offY,
      mid0X: (pts[0].x + pts[1].x) / 2,
      mid0Y: (pts[0].y + pts[1].y) / 2,
    };
    return;
  }

  // ピンチ直後は無視
  if (pinchJustEnded) return;
  if (!srcImg || pinchState) return;

  const hit = hitTestScreen(pos.x, pos.y);

  if (hit >= 0) {
    // 既存頂点をタッチ → ドラッグ or 長押し削除
    dragIdx = hit;
    didDrag = false;
    longTimer = setTimeout(() => {
      if (!didDrag) {
        points.splice(dragIdx, 1);
        dragIdx = -1;
        applied = false;
        updatePointCount();
        updateApplyBtn();
        render();
        showStatus('頂点を削除しました', 'info');
      }
    }, 600);
  } else {
    // 空白 → パン開始として記録（離した時に移動量が少なければ頂点追加）
    panStart = { cx: pos.x, cy: pos.y, ox: offX, oy: offY };
    didDrag  = false;
  }
}

function onPM(e) {
  e.preventDefault();
  const pos = getWrapPos(e);
  activePointers.set(e.pointerId, pos);

  // ピンチ
  if (pinchState && activePointers.size === 2) {
    const pts  = [...activePointers.values()];
    const dist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
    const midX = (pts[0].x + pts[1].x) / 2;
    const midY = (pts[0].y + pts[1].y) / 2;
    const ratio    = dist / pinchState.dist;
    const newScale = Math.min(20, Math.max(0.05, pinchState.scale0 * ratio));
    const imgMidX  = (pinchState.mid0X - pinchState.offX0) / pinchState.scale0;
    const imgMidY  = (pinchState.mid0Y - pinchState.offY0) / pinchState.scale0;
    scale = newScale;
    offX  = midX - imgMidX * newScale;
    offY  = midY - imgMidY * newScale;
    updateZoomLabel();
    render();
    return;
  }

  // 頂点ドラッグ
  if (dragIdx >= 0) {
    didDrag = true;
    cancelLong();
    const ip = screenToImg(pos.x, pos.y);
    points[dragIdx].x = Math.max(0, Math.min(srcImg.width,  ip.x));
    points[dragIdx].y = Math.max(0, Math.min(srcImg.height, ip.y));
    applied = false;
    render();
    return;
  }

  // パン（空白ドラッグ）
  if (panStart) {
    const dx = pos.x - panStart.cx;
    const dy = pos.y - panStart.cy;
    if (Math.hypot(dx, dy) > 6) didDrag = true; // 6px以上動いたらパン確定
    offX = panStart.ox + dx;
    offY = panStart.oy + dy;
    render();
  }
}

function onPU(e) {
  e.preventDefault();
  activePointers.delete(e.pointerId);
  cancelLong();

  // ピンチ終了ガード
  if (pinchState && activePointers.size < 2) {
    pinchState     = null;
    pinchJustEnded = true;
    setTimeout(() => { pinchJustEnded = false; }, 300);
    dragIdx  = -1;
    panStart = null;
    return;
  }

  // 空白タップ（移動量6px未満）→ 頂点追加
  if (panStart && !didDrag && srcImg && dragIdx < 0) {
    const ip = screenToImg(panStart.cx, panStart.cy);
    // 画像範囲内のみ追加
    if (ip.x >= 0 && ip.x <= srcImg.width && ip.y >= 0 && ip.y <= srcImg.height) {
      points.push({ x: ip.x, y: ip.y });
      applied = false;
      updatePointCount();
      updateApplyBtn();
      render();
    }
  }

  dragIdx  = -1;
  panStart = null;
}

function cancelLong() {
  if (longTimer) { clearTimeout(longTimer); longTimer = null; }
}

// Mouse wheel zoom
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  if (!srcImg) return;
  const pos   = getWrapPos(e);
  const delta = e.deltaY > 0 ? 0.85 : 1.18;
  const imgX  = (pos.x - offX) / scale;
  const imgY  = (pos.y - offY) / scale;
  scale = Math.min(20, Math.max(0.05, scale * delta));
  offX  = pos.x - imgX * scale;
  offY  = pos.y - imgY * scale;
  updateZoomLabel();
  render();
}, { passive: false });

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.code === 'KeyZ') { undoPoint(); e.preventDefault(); }
});

function updateZoomLabel() {
  document.getElementById('zoom-indicator').textContent = Math.round(scale * 100) + '%';
}

/* ============================================================
   FABRIC
============================================================ */
function applyFabric() {
  if (!srcImg || points.length < 3 || !currentFabric) {
    showStatus('3点以上の頂点と生地が必要です', 'error');
    return;
  }
  applied = true;
  render();
  document.getElementById('download-btn').disabled = false;
  showStatus('生地を適用しました ✓', 'success');
}

/* ============================================================
   POINTS
============================================================ */
function undoPoint() {
  if (!points.length) return;
  points.pop();
  applied = false;
  updatePointCount();
  updateApplyBtn();
  render();
}
function clearPoints() {
  points  = [];
  applied = false;
  updatePointCount();
  updateApplyBtn();
  render();
}
function updatePointCount() {
  document.getElementById('point-count').textContent = points.length;
}
function updateApplyBtn() {
  document.getElementById('apply-btn').disabled = !(srcImg && points.length >= 3 && currentFabric);
}

/* ============================================================
   DOWNLOAD — full-res offscreen canvas
============================================================ */
function downloadImage() {
  if (!srcImg || !applied) { showStatus('先に生地を適用してください', 'error'); return; }
  const pw = document.getElementById('password').value;
  if (pw && pw !== APP_PW) { showStatus('パスワードが正しくありません', 'error'); return; }

  const out  = document.createElement('canvas');
  out.width  = srcImg.width;
  out.height = srcImg.height;
  const oc   = out.getContext('2d');

  oc.drawImage(srcImg, 0, 0);

  if (currentFabric && points.length >= 3) {
    const r = currentFabric.r, g = currentFabric.g, b = currentFabric.b;
    oc.save();
    oc.beginPath();
    oc.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) oc.lineTo(points[i].x, points[i].y);
    oc.closePath();
    oc.clip();
    if (blend <= 0) {
      oc.globalCompositeOperation = 'multiply';
      oc.globalAlpha = opacity;
      oc.fillStyle = `rgb(${r},${g},${b})`;
      oc.fillRect(0, 0, srcImg.width, srcImg.height);
    } else if (blend >= 1) {
      oc.globalCompositeOperation = 'source-over';
      oc.globalAlpha = opacity;
      oc.fillStyle = `rgb(${r},${g},${b})`;
      oc.fillRect(0, 0, srcImg.width, srcImg.height);
    } else {
      oc.globalCompositeOperation = 'multiply';
      oc.globalAlpha = opacity * (1 - blend);
      oc.fillStyle = `rgb(${r},${g},${b})`;
      oc.fillRect(0, 0, srcImg.width, srcImg.height);
      oc.globalCompositeOperation = 'source-over';
      oc.globalAlpha = opacity * blend;
      oc.fillStyle = `rgb(${r},${g},${b})`;
      oc.fillRect(0, 0, srcImg.width, srcImg.height);
    }
    oc.restore();
  }

  const link    = document.createElement('a');
  link.download = `tent_sim_${new Date().toISOString().slice(0,10)}.png`;
  link.href     = out.toDataURL('image/png');
  link.click();
  showStatus('保存しました 💾', 'success');
}

/* ============================================================
   RESET
============================================================ */
function resetAll() {
  srcImg = null; points = []; applied = false;
  scale = 1; offX = 0; offY = 0;
  empty.style.display = 'flex';
  vctx.clearRect(0, 0, cssW, cssH);
  updatePointCount();
  updateApplyBtn();
  document.getElementById('download-btn').disabled = true;
  hideStatus();
}

/* ============================================================
   STATUS
============================================================ */
let statusTimer = null;
function showStatus(msg, type = 'info') {
  const bar = document.getElementById('status-bar');
  bar.textContent = msg;
  bar.className   = 'show ' + type;
  if (statusTimer) clearTimeout(statusTimer);
  statusTimer = setTimeout(hideStatus, 3000);
}
function hideStatus() { document.getElementById('status-bar').className = ''; }
</script>
